version: "3.9"

services:
  # ----------------------------------------
  # PostgreSQL database
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: tms_password
      POSTGRES_DB: tms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/ERD.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # FastAPI backend
  # ----------------------------------------
  api:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tms_user:tms_password@db:5432/tms_db
    ports:
      - "8000:8000"
    volumes:
      - ./ml_models:/app/ml_models     # Mount thư mục chứa model .pkl
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
