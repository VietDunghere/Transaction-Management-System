version: "3.9"

# ============================================================
# Transaction Management System — Oracle 23ai Free
#
# Quản lý Oracle container. Backend chạy trực tiếp trên host
# qua scripts/restart_backend.sh.
#
# Lần đầu:   docker compose up -d
# Reload:     docker compose restart oracle
# Xem log:   docker compose logs -f oracle
# ============================================================

services:

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-tms
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: "${ORACLE_SYS_PASSWORD:-Admin1234}"
      APP_USER: "${ORACLE_APP_USER:-tms_user}"
      APP_USER_PASSWORD: "${ORACLE_APP_PASSWORD:-Tms1234}"
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle_data:
    driver: local
