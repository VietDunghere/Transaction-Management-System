version: "3.9"

# ============================================================
# Transaction Management System — Oracle 23ai Free (Official)
#
# Image: container-registry.oracle.com/database/free:latest
# Requires: docker login container-registry.oracle.com
#           (Oracle account at container-registry.oracle.com)
#
# Lần đầu:  docker compose up -d
# Reload:   docker compose restart oracle
# Log:      docker compose logs -f oracle
# ============================================================

services:

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-tms
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: "${ORACLE_SYS_PASSWORD:-Admin1234}"     # SYS / SYSTEM password
      APP_USER: "${ORACLE_APP_USER:-tms_user}"
      APP_USER_PASSWORD: "${ORACLE_APP_PASSWORD:-Tms1234}"
    shm_size: '1gb'
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      # Init script chạy 1 lần sau khi DB được tạo lần đầu
      - ./scripts/oracle:/opt/oracle/scripts/setup
    healthcheck:
      test: ["CMD", "/opt/oracle/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

volumes:
  oracle_data:
    driver: local
