<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Huza Fraud - Transaction Management & Fraud Detection System" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <title>Huza Fraud</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var fallback = function () {
          return 'uuid-' + Date.now() + '-' + Math.random().toString(16).slice(2, 10);
        };

        try {
          if (!window.crypto) {
            window.crypto = { randomUUID: fallback };
            return;
          }

          if (typeof window.crypto.randomUUID !== 'function') {
            Object.defineProperty(window.crypto, 'randomUUID', {
              value: fallback,
              configurable: true,
            });
          }
        } catch (_e) {
          // Keep app booting even if browser disallows crypto patching.
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
